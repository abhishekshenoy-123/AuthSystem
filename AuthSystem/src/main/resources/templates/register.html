<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - AuthSystem</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p>Join us today</p>
        
        <div th:if="${error}" class="error-msg" th:text="${error}"></div>

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Register</button>
        </form>
        
        <div style="margin-top: 1.5rem;">
            <span style="color: var(--text-secondary); font-size: 0.9rem;">Already have an account? <a href="/" class="link">Go back</a></span>
        </div>
    </div>
</body>
</html>

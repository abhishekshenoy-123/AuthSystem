<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Success - AuthSystem</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>
        <h1>Success!</h1>
        <p>You have logged in successfully.</p>
        
        <div style="background-color: #2a2a2a; border-radius: 8px; padding: 1rem; margin-top: 1.5rem; text-align: left;">
            <p style="margin-bottom: 0.5rem; color: #fff; font-size: 0.9rem;">
                Logged in as: <strong th:text="${username ?: 'Native User'}" style="color: var(--primary-color);"></strong>
            </p>
        </div>

        <a href="/" class="btn btn-primary" style="margin-top: 2rem;">Back to Home</a>
    </div>
</body>
</html>
